# ============================================================
# Ameya Precision Engineers - Dispatch Tracker v5
# ============================================================

server.port=8888
server.address=0.0.0.0
spring.application.name=invoice-tracker

# ============================================================
# DATABASE - H2 (File-based persistent)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ameya_dispatch?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Mauli@123
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ============================================================
# FILE STORAGE
# ============================================================
app.upload.dir=./uploads
app.upload.excel-dir=./uploads/excel
app.upload.pdf-dir=./uploads/pdf
app.upload.packing-dir=./uploads/packing
app.upload.max-file-size=50MB

# ============================================================
# MULTIPART
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================
# JWT SECURITY
# ============================================================
app.jwt.secret=AmeyaPrecisionEngineersInvoiceTrackerSecretKey2024VeryLongSecretForHS256
app.jwt.expiration-ms=86400000

# ============================================================
# LOGGING
# ============================================================
logging.level.com.ameya=INFO
logging.level.org.springframework.security=WARN

# ============================================================
# SSL / HTTPS  (required for PWA / Service Worker)
# keystore.p12 must be placed in the invoice-tracker/ folder
# Generate with: keytool -genkeypair -alias dispatch -keyalg RSA
#   -keysize 2048 -storetype PKCS12 -keystore keystore.p12
#   -validity 3650 -storepass ameya@2024
# ============================================================
server.ssl.enabled=true
server.ssl.key-store=./keystore.p12
server.ssl.key-store-password=ameya@2024
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=dispatch
